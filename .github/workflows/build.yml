name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
      # Lint is intentionally not enforced in CI yet because the Lovable scaffold
      # currently has non-blocking CRLF prettier noise. Build validation is the deployment gate.
